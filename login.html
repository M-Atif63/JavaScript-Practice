<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
</head>

<body>
    <center><h1>Login page</h1>
    <form autocomplete="on">
        <label for="text">Name:</label>
        <input type="text" id="username" placeholder="Enter Name" name="name" autocomplete="name" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter Email" name="email" autocomplete="email"><br>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter Password" name="password" autocomplete="off"><br>
        <button id="submitBtn">Submit</button>
    </form> 
</center>
</body>
<script type="module" src="login.js"></script>

</html>
